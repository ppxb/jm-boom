name: Publish JM BOOM image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ppxb/jm-boom

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$version' (expected e.g. 1.2.3)" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: version
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: -vv --current
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

  create-draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [version, changelog]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Draft Release
        shell: bash
        run: |
          tag="v${VERSION}"

          if gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release '$tag' already exists; keeping the existing release body."
            exit 0
          fi

          gh release create "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "Release $tag" \
            --notes "$RELEASE_BODY" \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
          RELEASE_BODY: ${{ needs.changelog.outputs.release_body }}

  # 仅用于按架构预热 buildx/GHA 缓存，不推送任何镜像，
  # 因此不会在 registry 里留下 build-<run_id>-<arch> 这类中间 tag。
  build:
    name: Warm cache (${{ matrix.suffix }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Warm cache [${{ matrix.platform }}]
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: type=gha,scope=jm-boom-${{ matrix.suffix }}
          cache-to: type=gha,scope=jm-boom-${{ matrix.suffix }},mode=max
          provenance: false
          sbom: false

  # 一步构建并推送多架构 manifest，复用上面预热好的按架构缓存，
  # registry 中只会出现最终的正式 tag。
  publish:
    name: Build and push multi-arch image
    needs: [version, build]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push (multi-arch)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=jm-boom-amd64
            type=gha,scope=jm-boom-arm64
          provenance: false
          sbom: false

  publish-release:
    name: Publish release
    needs: [version, create-draft-release, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        run: gh release edit "v${VERSION}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
