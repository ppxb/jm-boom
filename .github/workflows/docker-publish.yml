name: Publish Docker image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Image version without the v prefix
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ppxb/jm-boom

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$version' (expected e.g. 1.2.3)" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:build-${{ github.run_id }}-${{ matrix.suffix }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            REVISION=${{ github.sha }}
          cache-from: |
            type=gha,scope=jm-boom-${{ matrix.suffix }}
          cache-to: type=gha,scope=jm-boom-${{ matrix.suffix }},mode=max
          provenance: false
          sbom: false

  merge:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          version="${{ needs.version.outputs.version }}"
          image="${{ env.IMAGE_NAME }}"
          build_tag_base="${image}:build-${{ github.run_id }}"

          tags=("${image}:${version}")
          tags+=("${image}:${version%%.*}.$(echo "$version" | cut -d. -f2)")
          tags+=("${image}:${version%%.*}")
          tags+=("${image}:sha-${GITHUB_SHA::7}")

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tags+=("${image}:latest")
          fi

          args=()
          for tag in "${tags[@]}"; do
            args+=(-t "$tag")
          done

          docker buildx imagetools create \
            "${args[@]}" \
            "${build_tag_base}-amd64" \
            "${build_tag_base}-arm64"
