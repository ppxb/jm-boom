name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.2.2'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release inputs
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi

          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like v0.2.2, got: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          package_version="$(jq -r '.version' package.json)"
          tauri_version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          cargo_version="$(awk -F' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' src-tauri/Cargo.toml)"
          lock_version="$(awk '$0 == "name = \"jm-boom\"" { found=1; next } found && /^version = / { gsub(/"/, "", $3); print $3; exit }' src-tauri/Cargo.lock)"

          if [ "$package_version" != "$version" ] || [ "$tauri_version" != "$version" ] || [ "$cargo_version" != "$version" ] || [ "$lock_version" != "$version" ]; then
            echo "Version mismatch for $tag" >&2
            echo "package.json: $package_version" >&2
            echo "src-tauri/tauri.conf.json: $tauri_version" >&2
            echo "src-tauri/Cargo.toml: $cargo_version" >&2
            echo "src-tauri/Cargo.lock: $lock_version" >&2
            exit 1
          fi

          test -f "docs/release-notes/$tag.md"
          for section in "功能" "优化" "修复" "其他"; do
            if ! grep -q "^## $section" "docs/release-notes/$tag.md"; then
              echo "docs/release-notes/$tag.md must contain section: ## $section" >&2
              exit 1
            fi
          done

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            git fetch --tags --force
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              tag_sha="$(git rev-list -n 1 "$tag")"
              if [ "$tag_sha" != "$GITHUB_SHA" ]; then
                echo "Tag already exists at a different commit: $tag" >&2
                echo "tag: $tag_sha" >&2
                echo "current: $GITHUB_SHA" >&2
                exit 1
              fi
              echo "Tag already exists at current commit: $tag"
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "$tag" "$GITHUB_SHA"
              git push origin "refs/tags/$tag"
            fi
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-release:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows-x86_64
            arch: x86_64
          - os: windows-11-arm
            platform: windows-aarch64
            arch: arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
            arch: x86_64
          - os: ubuntu-22.04-arm
            platform: linux-aarch64
            arch: arm64
          - os: macos-14
            platform: macos-universal
            arch: universal
            target: universal-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows ARM64 target
        if: runner.os == 'Windows' && matrix.arch == 'arm64'
        shell: pwsh
        run: rustup target add aarch64-pc-windows-msvc

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            elfutils \
            file \
            flatpak \
            flatpak-builder \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Prepare Tauri signing key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required" >&2
            exit 1
          fi

          raw="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          key_path="$RUNNER_TEMP/tauri_signing.key"
          if echo "$raw" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$raw" > "$key_path"
          elif decoded=$(printf '%s' "$raw" | base64 --decode 2>/dev/null) && echo "$decoded" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$decoded" > "$key_path"
          else
            printf '%s\n%s\n' "untrusted comment: tauri signing key" "$raw" > "$key_path"
          fi

          key_b64=$(base64 < "$key_path" | tr -d '\r\n')
          echo "TAURI_SIGNING_PRIVATE_KEY=$key_b64" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

      - name: Build Tauri Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:RELEASE_ARCH -eq 'arm64') {
            bun run tauri build --target aarch64-pc-windows-msvc --bundles msi
          } else {
            bun run tauri build --bundles msi
          }

      - name: Build Tauri Linux packages
        if: runner.os == 'Linux'
        run: bun run tauri build --bundles appimage,deb,rpm

      - name: Build Tauri macOS packages
        if: runner.os == 'macOS'
        env:
          RELEASE_TARGET: ${{ matrix.target }}
        run: bun run tauri build --target "$RELEASE_TARGET" --bundles app,dmg

      - name: Prepare Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $version = '${{ needs.prepare-release.outputs.tag }}'
          $isArm64 = $env:RELEASE_ARCH -eq 'arm64'
          $targetRoot = if ($isArm64) { 'src-tauri/target/aarch64-pc-windows-msvc/release' } else { 'src-tauri/target/release' }
          $assetSuffix = if ($isArm64) { '-arm64' } else { '' }
          $msi = Get-ChildItem -Path (Join-Path $targetRoot 'bundle/msi') -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            throw 'No MSI artifact found'
          }
          $dest = "JM-Boom-$version-Windows$assetSuffix.msi"
          Copy-Item $msi.FullName "release-assets/$dest"
          $sig = "$($msi.FullName).sig"
          if (-not (Test-Path $sig)) {
            throw "No updater signature found for $($msi.Name)"
          }
          Copy-Item $sig "release-assets/$dest.sig"

      - name: Prepare Linux release assets
        if: runner.os == 'Linux'
        shell: bash
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          version='${{ needs.prepare-release.outputs.tag }}'
          appimage="$(find src-tauri/target/release/bundle -name '*.AppImage' -type f | head -1 || true)"
          if [ -z "$appimage" ]; then
            echo "No AppImage artifact found" >&2
            exit 1
          fi
          dest="JM-Boom-$version-Linux-$RELEASE_ARCH.AppImage"
          cp "$appimage" "release-assets/$dest"
          if [ ! -f "$appimage.sig" ]; then
            echo "No updater signature found for $(basename "$appimage")" >&2
            exit 1
          fi
          cp "$appimage.sig" "release-assets/$dest.sig"

          deb="$(find src-tauri/target/release/bundle -name '*.deb' -type f | head -1 || true)"
          if [ -n "$deb" ]; then
            cp "$deb" "release-assets/JM-Boom-$version-Linux-$RELEASE_ARCH.deb"
          fi

          rpm="$(find src-tauri/target/release/bundle -name '*.rpm' -type f | head -1 || true)"
          if [ -n "$rpm" ]; then
            cp "$rpm" "release-assets/JM-Boom-$version-Linux-$RELEASE_ARCH.rpm"
          fi

      - name: Prepare macOS release assets
        if: runner.os == 'macOS'
        shell: bash
        env:
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          version='${{ needs.prepare-release.outputs.tag }}'
          bundle_roots=(
            "src-tauri/target/$RELEASE_TARGET/release/bundle"
            "src-tauri/target/aarch64-apple-darwin/release/bundle"
            "src-tauri/target/x86_64-apple-darwin/release/bundle"
            "src-tauri/target/release/bundle"
          )

          dmg=""
          updater=""
          for bundle_root in "${bundle_roots[@]}"; do
            if [ -d "$bundle_root" ]; then
              [ -z "$dmg" ] && dmg="$(find "$bundle_root/dmg" -name '*.dmg' -type f | head -1 || true)"
              [ -z "$updater" ] && updater="$(find "$bundle_root" -type f \( -name '*.app.tar.gz' -o -name '*.tar.gz' -o -name '*.zip' \) | head -1 || true)"
            fi
          done

          if [ -z "$dmg" ]; then
            echo "No DMG artifact found" >&2
            exit 1
          fi
          cp "$dmg" "release-assets/JM-Boom-$version-macOS.dmg"

          if [ -z "$updater" ]; then
            echo "No macOS updater artifact found" >&2
            exit 1
          fi

          case "$updater" in
            *.app.tar.gz) updater_ext="app.tar.gz" ;;
            *.tar.gz) updater_ext="tar.gz" ;;
            *.zip) updater_ext="zip" ;;
            *)
              echo "Unsupported macOS updater artifact: $updater" >&2
              exit 1
              ;;
          esac

          updater_dest="JM-Boom-$version-macOS.$updater_ext"
          cp "$updater" "release-assets/$updater_dest"
          if [ ! -f "$updater.sig" ]; then
            echo "No updater signature found for $(basename "$updater")" >&2
            exit 1
          fi
          cp "$updater.sig" "release-assets/$updater_dest.sig"

      - name: Upload release assets to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - prepare-release
      - build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Ensure release notes
        run: test -f "docs/release-notes/${{ needs.prepare-release.outputs.tag }}.md"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: JM Boom ${{ needs.prepare-release.outputs.tag }}
          body_path: docs/release-notes/${{ needs.prepare-release.outputs.tag }}.md
          prerelease: false
          files: release-assets/*

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs:
      - prepare-release
      - publish-release
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          base_url="https://github.com/$REPO/releases/download/$TAG"
          win_x64_url=""; win_x64_sig=""
          win_arm64_url=""; win_arm64_sig=""
          linux_x64_url=""; linux_x64_sig=""
          linux_arm64_url=""; linux_arm64_sig=""
          macos_url=""; macos_sig=""

          shopt -s nullglob
          for sig_file in dl/*.sig; do
            artifact="${sig_file%.sig}"
            file_name="$(basename "$artifact")"
            signature="$(cat "$sig_file")"
            url="$base_url/$file_name"

            case "$file_name" in
              *-Windows-arm64.msi)
                win_arm64_url="$url"; win_arm64_sig="$signature";;
              *-Windows.msi)
                win_x64_url="$url"; win_x64_sig="$signature";;
              *-Linux-arm64.AppImage|*-Linux-arm64.appimage)
                linux_arm64_url="$url"; linux_arm64_sig="$signature";;
              *-Linux-x86_64.AppImage|*-Linux-x86_64.appimage)
                linux_x64_url="$url"; linux_x64_sig="$signature";;
              *-macOS.app.tar.gz|*-macOS.tar.gz|*-macOS.zip)
                macos_url="$url"; macos_sig="$signature";;
            esac
          done

          tmp_json="$(mktemp)"
          {
            echo "{"
            echo "  \"version\": \"$version\","
            echo "  \"notes\": \"JM Boom $TAG\","
            echo "  \"pub_date\": \"$pub_date\","
            echo "  \"platforms\": {"
            first=1
            if [ -n "$win_x64_url" ] && [ -n "$win_x64_sig" ]; then
              [ "$first" -eq 0 ] && echo ","
              echo "    \"windows-x86_64\": {\"signature\": \"$win_x64_sig\", \"url\": \"$win_x64_url\"}"
              first=0
            fi
            if [ -n "$win_arm64_url" ] && [ -n "$win_arm64_sig" ]; then
              [ "$first" -eq 0 ] && echo ","
              echo "    \"windows-aarch64\": {\"signature\": \"$win_arm64_sig\", \"url\": \"$win_arm64_url\"}"
              first=0
            fi
            if [ -n "$linux_x64_url" ] && [ -n "$linux_x64_sig" ]; then
              [ "$first" -eq 0 ] && echo ","
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_x64_sig\", \"url\": \"$linux_x64_url\"}"
              first=0
            fi
            if [ -n "$linux_arm64_url" ] && [ -n "$linux_arm64_sig" ]; then
              [ "$first" -eq 0 ] && echo ","
              echo "    \"linux-aarch64\": {\"signature\": \"$linux_arm64_sig\", \"url\": \"$linux_arm64_url\"}"
              first=0
            fi
            if [ -n "$macos_url" ] && [ -n "$macos_sig" ]; then
              for key in darwin-x86_64 darwin-aarch64; do
                [ "$first" -eq 0 ] && echo ","
                echo "    \"$key\": {\"signature\": \"$macos_sig\", \"url\": \"$macos_url\"}"
                first=0
              done
            fi
            echo ""
            echo "  }"
            echo "}"
          } > "$tmp_json"

          jq -e '.platforms | length > 0' "$tmp_json" >/dev/null
          mv "$tmp_json" latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"
